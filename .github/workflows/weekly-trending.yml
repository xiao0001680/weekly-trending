name: Weekly GitHub Trending

on:
  schedule:
    # 每周日 UTC 00:00（北京时间 08:00）自动运行
    - cron: "0 0 * * 0"
  # 也支持手动触发
  workflow_dispatch:

jobs:
  fetch-trending:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 用于 commit & push 数据库文件

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r scripts/requirements.txt

      - name: 抓取本周 Trending
        run: python scripts/fetch_trending.py --export

      - name: 提交数据库 & CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending.db data/trending_export.csv
          git diff --cached --quiet || (
            git commit -m "📊 更新本周 GitHub Trending $(date +%Y-%m-%d)"
            git push
          )
